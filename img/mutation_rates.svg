<svg width="410" height="220" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            text-anchor: middle;
            alignment-baseline: middle;
        }
        .chart-labels { font-size: 15px; }
        .bar-chart text {
            font-family: sans-serif;
            font-size: 12px;
        }
    </style>

    <g class="chart-labels" transform="translate(40,10)">
        <text y="25">Negative</text>
        <text y="100">Neutral</text>
        <text y="175">Positive</text>
    </g>

    <g class="bar-chart" transform="translate(80,10)">
        <g transform="translate(0)" color="rgb(0, 63, 92)">
            <rect y="0" width="50" height="49.5" fill="currentColor" opacity="0.95"/>
            <rect y="50.5" width="50" height="99" fill="currentColor" opacity="0.8"/>
            <rect y="150.5" width="50" height="49.5" fill="currentColor" opacity="0.65"/>
            <text fill="white" x="25" y="25">25%</text>
            <text fill="white" x="25" y="100">50%</text>
            <text fill="white" x="25" y="175">25%</text>
        </g>
        <g transform="translate(90)" color="rgb(122, 81, 149)">
            <rect y="0" width="50" height="39.5" fill="currentColor" opacity="0.95"/>
            <rect y="40.5" width="50" height="99" fill="currentColor" opacity="0.8"/>
            <rect y="140.5" width="50" height="59.5" fill="currentColor" opacity="0.65"/>
            <text fill="white" x="25" y="20">20%</text>
            <text fill="white" x="25" y="90">50%</text>
            <text fill="white" x="25" y="170">30%</text>
        </g>
        <g transform="translate(180)" color="rgb(239, 86, 117)">
            <rect y="0" width="50" height="29.5" fill="currentColor" opacity="0.95"/>
            <rect y="30.5" width="50" height="99" fill="currentColor" opacity="0.8"/>
            <rect y="130.5" width="50" height="69.5" fill="currentColor" opacity="0.65"/>
            <text fill="white" x="25" y="15">15%</text>
            <text fill="white" x="25" y="80">50%</text>
            <text fill="white" x="25" y="165">35%</text>
        </g>
        <g transform="translate(270)" color="rgb(255, 166, 0)">
            <rect y="0" width="50" height="19.5" fill="currentColor" opacity="0.95"/>
            <rect y="20.5" width="50" height="99" fill="currentColor" opacity="0.8"/>
            <rect y="120.5" width="50" height="79.5" fill="currentColor" opacity="0.65"/>
            <text fill="white" x="25" y="10">10%</text>
            <text fill="white" x="25" y="70">50%</text>
            <text fill="white" x="25" y="160">40%</text>
        </g>
    </g>
</svg>